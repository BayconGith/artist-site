<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Artist Site</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #000; --bg2: #0a0a0a; --bg3: #141414; --bg4: #1e1e1e;
    --text: #fff; --text2: #666; --text3: #333;
    --border: #1c1c1c;
    --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }

  /* ── HEADER ── */
  .site-header {
    padding: 1.2rem 1.2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--bg); z-index: 100;
    gap: 0.5rem;
  }
  .artist-info { min-width: 0; flex: 1; }
  .artist-name { font-family: var(--mono); font-size: 0.95rem; font-weight: 700; letter-spacing: 0.04em; color: var(--text); cursor: default; user-select: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
  .artist-tagline { font-size: 0.62rem; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-right { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }

  .ig-link { display: none; align-items: center; justify-content: center; width: 28px; height: 28px; border: 1px solid var(--border); color: var(--text3); text-decoration: none; transition: color 0.15s, border-color 0.15s; flex-shrink: 0; }
  .ig-link.visible { display: flex; }
  .ig-link:hover { color: var(--text); border-color: var(--text3); }
  .ig-link svg { width: 13px; height: 13px; fill: currentColor; }

  .edit-artist-btn { display: none; background: none; border: 1px solid var(--border); color: var(--text3); padding: 0.3rem 0.55rem; font-family: var(--mono); font-size: 0.5rem; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; }
  body.admin .edit-artist-btn { display: inline-block; }
  .edit-artist-btn:hover { color: var(--text); border-color: var(--text3); }

  .upload-btn { display: none; background: var(--text); color: var(--bg); border: none; padding: 0.3rem 0.65rem; font-family: var(--mono); font-size: 0.5rem; font-weight: 700; letter-spacing: 0.08em; cursor: pointer; text-transform: uppercase; }
  body.admin .upload-btn { display: inline-block; }
  .upload-btn:hover { background: #ddd; }

  .admin-badge { display: none; font-family: var(--mono); font-size: 0.5rem; color: var(--text3); border: 1px solid var(--border); padding: 0.2rem 0.4rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; }
  body.admin .admin-badge { display: inline-block; }
  .admin-badge:hover { color: var(--text); }

  /* ── HERO ── */
  .now-playing-hero { display: flex; flex-direction: column; border-bottom: 1px solid var(--border); }

  .hero-cover-wrap { width: 100%; aspect-ratio: 1; max-height: 320px; overflow: hidden; background: var(--bg3); display: flex; align-items: center; justify-content: center; position: relative; }
  .hero-cover { width: 100%; height: 100%; object-fit: cover; display: none; }
  .hero-cover.visible { display: block; }
  .hero-cover-placeholder { font-size: 4rem; color: var(--text3); font-family: var(--mono); }

  .hero-info { padding: 1.2rem; background: var(--bg2); display: flex; flex-direction: column; gap: 1rem; }

  .hero-top { display: flex; flex-direction: column; gap: 0.2rem; }
  .playing-label { font-family: var(--mono); font-size: 0.55rem; color: var(--text3); letter-spacing: 0.2em; text-transform: uppercase; display: none; }
  .playing-label.visible { display: block; }
  .hero-track-title { font-family: var(--mono); font-size: 0.85rem; font-weight: 400; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hero-track-title.loaded { color: var(--text); font-size: 1.2rem; font-weight: 700; white-space: normal; line-height: 1.2; }
  .hero-track-artist { font-size: 0.72rem; color: var(--text3); font-family: var(--mono); letter-spacing: 0.05em; }

  /* ── WAVEFORM ── */
  .progress-wrap { display: flex; flex-direction: column; gap: 0.35rem; }
  .waveform-container { height: 52px; background: transparent; cursor: pointer; position: relative; }
  canvas#waveCanvas { width: 100%; height: 100%; display: block; }
  .time-row { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 0.6rem; color: var(--text3); }

  /* ── CONTROLS ── */
  .controls { display: flex; align-items: center; gap: 1rem; }
  .ctrl-btn { background: none; border: none; cursor: pointer; color: var(--text3); transition: color 0.12s; font-size: 0.85rem; display: flex; align-items: center; padding: 0.4rem; }
  .ctrl-btn:hover { color: var(--text); }
  .play-btn { width: 40px; height: 40px; border: 1px solid var(--text); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.12s, color 0.12s; color: var(--text); font-size: 0.9rem; flex-shrink: 0; }
  .play-btn:hover { background: var(--text); color: var(--bg); }
  .play-btn:active { transform: scale(0.96); }

  /* ── TRACKS ── */
  .tracks-section { padding: 0 1rem 5rem; }
  .section-label { font-family: var(--mono); font-size: 0.55rem; color: var(--text3); letter-spacing: 0.2em; text-transform: uppercase; padding: 0.9rem 0 0.6rem; border-bottom: 1px solid var(--border); }

  .track-row { display: grid; grid-template-columns: 24px 44px 1fr auto; align-items: center; gap: 0.65rem; padding: 0.65rem 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .track-row:hover { background: var(--bg2); }
  .track-row.active { background: var(--bg3); }

  .track-num { font-family: var(--mono); font-size: 0.62rem; color: var(--text3); text-align: center; }
  .track-row.active .track-num { display: none; }
  .track-mini-play { display: none; align-items: center; justify-content: center; width: 24px; height: 24px; border: 1px solid var(--text3); background: none; cursor: pointer; color: var(--text); font-size: 0.65rem; }
  .track-row.active .track-mini-play { display: flex; }
  .track-mini-play:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

  .track-thumb { width: 44px; height: 44px; object-fit: cover; display: block; flex-shrink: 0; background: var(--bg3); }
  .track-thumb-ph { width: 44px; height: 44px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--text3); flex-shrink: 0; }

  .track-meta { min-width: 0; }
  .track-title { font-weight: 500; font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .track-row.active .track-title { color: var(--text); }
  .track-sub { font-size: 0.58rem; color: var(--text3); margin-top: 2px; font-family: var(--mono); letter-spacing: 0.06em; }

  .track-delete { display: none; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 0.75rem; padding: 0.5rem; transition: color 0.12s; }
  body.admin .track-delete { display: block; }
  .track-delete:hover { color: var(--text); }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text3); }
  .empty-state .big-icon { font-size: 2rem; margin-bottom: 0.75rem; }
  .empty-state p { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; }

  /* ── MODALS ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--bg2); border-top: 1px solid var(--border); width: 100%; max-width: 520px; padding: 1.5rem 1.2rem 2.5rem; max-height: 92vh; overflow-y: auto; }
  .modal-handle { width: 32px; height: 3px; background: var(--border); margin: 0 auto 1.2rem; }
  .modal-title { font-family: var(--mono); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text); margin-bottom: 1.2rem; }
  .form-group { margin-bottom: 1rem; }
  .form-label { display: block; font-family: var(--mono); font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 0.35rem; }
  .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 0.75rem 0.8rem; font-family: var(--sans); font-size: 1rem; outline: none; transition: border-color 0.15s; -webkit-appearance: none; border-radius: 0; }
  .form-input:focus { border-color: var(--text3); }

  .file-drop { border: 1px solid var(--border); padding: 1.2rem; text-align: center; cursor: pointer; transition: border-color 0.15s; color: var(--text3); font-size: 0.8rem; position: relative; }
  .file-drop:hover { border-color: var(--text3); }
  .file-drop input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .file-drop .drop-icon { font-size: 1.3rem; margin-bottom: 0.3rem; }
  .file-drop .drop-hint { font-family: var(--mono); font-size: 0.58rem; color: var(--text3); margin-top: 0.3rem; letter-spacing: 0.06em; }
  .file-chosen { color: var(--text); font-family: var(--mono); font-size: 0.68rem; }
  .cover-preview { width: 100%; height: 110px; object-fit: cover; display: none; margin-top: 0.5rem; }

  .modal-actions { display: flex; gap: 0.5rem; margin-top: 1.2rem; }
  .btn-cancel { flex: 1; background: none; border: 1px solid var(--border); color: var(--text3); padding: 0.8rem; font-family: var(--mono); font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; }
  .btn-cancel:hover { color: var(--text); border-color: var(--text3); }
  .btn-primary { flex: 2; background: var(--text); border: none; color: var(--bg); padding: 0.8rem; font-family: var(--mono); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; }
  .btn-primary:hover { background: #ddd; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

  .upload-progress { display: none; margin-top: 0.8rem; }
  .upload-progress.visible { display: block; }
  .progress-bar-wrap { height: 2px; background: var(--bg4); }
  .progress-bar-fill { height: 100%; background: var(--text); width: 0%; transition: width 0.3s; }
  .progress-text { font-family: var(--mono); font-size: 0.58rem; color: var(--text3); margin-top: 0.4rem; text-align: center; letter-spacing: 0.06em; }

  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(5rem); background: var(--text); color: var(--bg); padding: 0.6rem 1.2rem; font-family: var(--mono); font-size: 0.65rem; z-index: 300; transition: transform 0.22s; white-space: nowrap; letter-spacing: 0.06em; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--bg2); color: var(--text); border: 1px solid var(--text3); }
  .login-hint { font-family: var(--mono); font-size: 0.55rem; color: var(--text3); text-align: center; margin-top: 0.8rem; letter-spacing: 0.06em; }

  @media (min-width: 640px) {
    .site-header { padding: 1.6rem 2.5rem 1.3rem; }
    .artist-name { font-size: 1.1rem; }
    .now-playing-hero { flex-direction: row; min-height: 260px; }
    .hero-cover-wrap { width: 260px; min-width: 260px; height: 260px; aspect-ratio: unset; max-height: unset; }
    .hero-info { padding: 1.8rem 2rem; flex: 1; }
    .tracks-section { padding: 0 2.5rem 4rem; }
    .track-row { grid-template-columns: 32px 52px 1fr auto; gap: 0.9rem; }
    .track-thumb, .track-thumb-ph { width: 52px; height: 52px; }
    .modal-overlay { align-items: center; }
    .modal { border: 1px solid var(--border); border-top: 1px solid var(--border); max-width: 460px; padding: 2rem; }
    .modal-handle { display: none; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="artist-info">
    <div class="artist-name" id="artistName">—</div>
    <div class="artist-tagline" id="artistTagline">—</div>
  </div>
  <div class="header-right">
    <a class="ig-link" id="igLink" href="#" target="_blank" rel="noopener" title="Instagram">
      <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
    </a>
    <span class="admin-badge" onclick="logout()">ADMIN ✕</span>
    <button class="edit-artist-btn" onclick="openEditArtist()">Edit</button>
    <button class="upload-btn" onclick="openUpload()">+ Upload</button>
  </div>
</header>

<div class="now-playing-hero">
  <div class="hero-cover-wrap">
    <div class="hero-cover-placeholder" id="heroCoverPh">—</div>
    <img class="hero-cover" id="heroCoverImg" alt="Cover">
  </div>
  <div class="hero-info">
    <div class="hero-top">
      <div class="playing-label" id="playingLabel">▶ Now Playing</div>
      <div class="hero-track-title" id="heroTitle">—</div>
      <div class="hero-track-artist" id="heroArtist"></div>
    </div>
    <div class="progress-wrap">
      <div class="waveform-container" id="waveformContainer">
        <canvas id="waveCanvas"></canvas>
      </div>
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="prevTrack()" title="Previous">⏮</button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Next">⏭</button>
    </div>
  </div>
</div>

<div class="tracks-section">
  <div class="section-label">Tracks</div>
  <div id="trackList"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="big-icon">—</div>
    <p>No tracks yet</p>
  </div>
</div>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Admin</div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="loginPassword" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitLogin()">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeLogin()">Cancel</button>
      <button class="btn-primary" onclick="submitLogin()">Enter</button>
    </div>
    <div class="login-hint">Triple-tap artist name to open</div>
  </div>
</div>

<!-- UPLOAD MODAL -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Upload Track</div>
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input class="form-input" id="inputTitle" type="text" placeholder="Track name">
    </div>
    <div class="form-group">
      <label class="form-label">Audio File *</label>
      <div class="file-drop">
        <input type="file" accept=".mp3,.wav" onchange="handleAudioFile(this)" id="audioInput">
        <div class="drop-icon">♪</div>
        <div id="audioChosen">Tap to browse</div>
        <div class="drop-hint">MP3 · WAV · max 100MB</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Cover Photo</label>
      <div class="file-drop">
        <input type="file" accept="image/*" onchange="handleCoverFile(this)" id="coverInput">
        <div class="drop-icon">□</div>
        <div id="coverChosen">Tap to browse</div>
        <div class="drop-hint">JPG · PNG · WEBP</div>
      </div>
      <img id="coverPreview" class="cover-preview" alt="preview">
    </div>
    <div class="upload-progress" id="uploadProgress">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Uploading...</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeUpload()">Cancel</button>
      <button class="btn-primary" id="uploadSubmitBtn" onclick="submitUpload()">Upload</button>
    </div>
  </div>
</div>

<!-- EDIT ARTIST MODAL -->
<div class="modal-overlay" id="editArtistModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Profile</div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="inputArtistName" type="text" placeholder="Your Name">
    </div>
    <div class="form-group">
      <label class="form-label">Tagline</label>
      <input class="form-input" id="inputArtistTagline" type="text" placeholder="Producer · Artist">
    </div>
    <div class="form-group">
      <label class="form-label">Instagram URL</label>
      <input class="form-input" id="inputIg" type="url" placeholder="https://instagram.com/yourhandle">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditArtist()">Cancel</button>
      <button class="btn-primary" onclick="saveArtist()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<audio id="audioEl"></audio>

<script>
const ADMIN_PASSWORD = 'admin123';

const audioEl = document.getElementById('audioEl');
const canvas  = document.getElementById('waveCanvas');
const ctx     = canvas.getContext('2d');

let tracks = [], currentIdx = -1, isPlaying = false;
let pendingAudioFile = null, pendingCoverFile = null;
let waveformData = []; // actual decoded audio samples

// ── ADMIN AUTH ─────────────────────────────────────────
let isAdmin = sessionStorage.getItem('artistAdmin') === '1';
if (isAdmin) document.body.classList.add('admin');

// Triple-tap or double-click to open admin
let tapCount = 0, tapTimer;
document.getElementById('artistName').addEventListener('click', () => {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => { if (tapCount >= 3 && !isAdmin) openLogin(); tapCount = 0; }, 500);
});
document.getElementById('artistName').addEventListener('dblclick', () => { if (!isAdmin) openLogin(); });

function openLogin() {
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginPassword').placeholder = '••••••••';
  document.getElementById('loginModal').classList.add('open');
  setTimeout(() => document.getElementById('loginPassword').focus(), 150);
}
function closeLogin() { document.getElementById('loginModal').classList.remove('open'); }
function submitLogin() {
  const pw = document.getElementById('loginPassword').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true; sessionStorage.setItem('artistAdmin', '1');
    document.body.classList.add('admin');
    closeLogin(); showToast('Welcome back'); renderTracks();
  } else {
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginPassword').placeholder = 'Wrong password';
    document.getElementById('loginPassword').focus();
  }
}
function logout() {
  isAdmin = false; sessionStorage.removeItem('artistAdmin');
  document.body.classList.remove('admin');
  renderTracks(); showToast('Logged out');
}

// ── INIT ──────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/api/data');
    const data = await res.json();
    applyArtist(data.artist);
    tracks = data.tracks;
    renderTracks();
    drawWaveform([], 0); // draw empty waveform
    // Auto-load latest track (last in array)
    if (tracks.length > 0) {
      loadTrack(tracks.length - 1, false); // false = don't autoplay
    }
  } catch { showToast('Could not connect to server', true); }
}
init();

function applyArtist(a) {
  document.getElementById('artistName').textContent = a.name;
  document.getElementById('artistTagline').textContent = a.tagline;
  document.title = a.name;
  const igEl = document.getElementById('igLink');
  if (a.instagram) { igEl.href = a.instagram; igEl.classList.add('visible'); }
  else { igEl.classList.remove('visible'); }
}

// ── CANVAS WAVEFORM ───────────────────────────────────
function resizeCanvas() {
  const container = document.getElementById('waveformContainer');
  canvas.width  = container.clientWidth * window.devicePixelRatio;
  canvas.height = container.clientHeight * window.devicePixelRatio;
  canvas.style.width  = container.clientWidth + 'px';
  canvas.style.height = container.clientHeight + 'px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  drawWaveform(waveformData, audioEl.duration ? audioEl.currentTime / audioEl.duration : 0);
}
window.addEventListener('resize', resizeCanvas);

function drawWaveform(samples, progress) {
  const W = canvas.width  / window.devicePixelRatio;
  const H = canvas.height / window.devicePixelRatio;
  ctx.clearRect(0, 0, W, H);

  if (!samples.length) {
    // Draw flat placeholder line
    ctx.fillStyle = '#1e1e1e';
    ctx.fillRect(0, H / 2 - 1, W, 2);
    return;
  }

  const barW = 2;
  const gap  = 1;
  const total = Math.floor(W / (barW + gap));
  const step  = Math.floor(samples.length / total);
  const mid   = H / 2;
  const playedX = progress * W;

  for (let i = 0; i < total; i++) {
    const x = i * (barW + gap);
    // Average a chunk of samples for this bar
    let sum = 0;
    for (let j = 0; j < step; j++) sum += Math.abs(samples[i * step + j] || 0);
    const amp = sum / step;
    const barH = Math.max(2, amp * H * 0.9);

    ctx.fillStyle = x < playedX ? '#ffffff' : '#2a2a2a';
    ctx.fillRect(x, mid - barH / 2, barW, barH);
  }
}

async function decodeAudioWaveform(url) {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const response = await fetch(url);
    const arrayBuffer = await response.arrayBuffer();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    const raw = audioBuffer.getChannelData(0);
    // Downsample to 2000 points
    const points = 2000;
    const blockSize = Math.floor(raw.length / points);
    const data = [];
    for (let i = 0; i < points; i++) {
      let sum = 0;
      for (let j = 0; j < blockSize; j++) sum += Math.abs(raw[i * blockSize + j]);
      data.push(sum / blockSize);
    }
    audioCtx.close();
    return data;
  } catch { return []; }
}

// Seek on click/touch
document.getElementById('waveformContainer').addEventListener('click', e => {
  if (!audioEl.src || !audioEl.duration) return;
  const rect = canvas.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audioEl.currentTime = pct * audioEl.duration;
});

audioEl.addEventListener('timeupdate', () => {
  if (!audioEl.duration) return;
  const pct = audioEl.currentTime / audioEl.duration;
  drawWaveform(waveformData, pct);
  document.getElementById('currentTime').textContent = fmt(audioEl.currentTime);
});
audioEl.addEventListener('loadedmetadata', () => {
  document.getElementById('totalTime').textContent = fmt(audioEl.duration);
  resizeCanvas();
});
audioEl.addEventListener('ended', nextTrack);

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

// ── PLAYBACK ──────────────────────────────────────────
function togglePlay() {
  if (currentIdx < 0 && tracks.length > 0) { loadTrack(tracks.length - 1, true); return; }
  if (currentIdx < 0) return;
  if (isPlaying) { audioEl.pause(); setPlaying(false); }
  else { audioEl.play(); setPlaying(true); }
}
function setPlaying(v) {
  isPlaying = v;
  document.getElementById('playBtn').innerHTML = v ? '⏸' : '▶';
  document.getElementById('playingLabel').classList.toggle('visible', v);
}

async function loadTrack(idx, autoplay = true) {
  if (idx < 0 || idx >= tracks.length) return;
  currentIdx = idx;
  const t = tracks[idx];

  if (autoplay) { audioEl.src = t.audioUrl; audioEl.play(); setPlaying(true); }
  else { audioEl.src = t.audioUrl; setPlaying(false); }

  const titleEl = document.getElementById('heroTitle');
  titleEl.textContent = t.title;
  titleEl.className = 'hero-track-title loaded';
  document.getElementById('heroArtist').textContent = document.getElementById('artistName').textContent;

  const img = document.getElementById('heroCoverImg');
  const ph  = document.getElementById('heroCoverPh');
  if (t.coverUrl) { img.src = t.coverUrl; img.classList.add('visible'); ph.style.display = 'none'; }
  else { img.classList.remove('visible'); ph.style.display = 'flex'; }

  renderTracks();
  resizeCanvas();

  // Decode real waveform
  waveformData = [];
  drawWaveform([], 0);
  waveformData = await decodeAudioWaveform(t.audioUrl);
  drawWaveform(waveformData, 0);
}

function prevTrack() { if (tracks.length) loadTrack((currentIdx - 1 + tracks.length) % tracks.length); }
function nextTrack() { if (tracks.length) loadTrack((currentIdx + 1) % tracks.length); }

// ── TRACK LIST ────────────────────────────────────────
function renderTracks() {
  const list  = document.getElementById('trackList');
  const empty = document.getElementById('emptyState');
  if (!tracks.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = tracks.map((t, i) => `
    <div class="track-row${i === currentIdx ? ' active' : ''}" onclick="loadTrack(${i})">
      <span class="track-num">${i + 1}</span>
      <button class="track-mini-play" onclick="togglePlay();event.stopPropagation()">
        ${i === currentIdx && isPlaying ? '⏸' : '▶'}
      </button>
      ${t.coverUrl ? `<img class="track-thumb" src="${t.coverUrl}" alt="">` : `<div class="track-thumb-ph">—</div>`}
      <div class="track-meta">
        <div class="track-title">${escHtml(t.title)}</div>
        <div class="track-sub">${t.fileType || 'AUDIO'}</div>
      </div>
      <button class="track-delete" onclick="deleteTrack('${t.id}',${i},event)">✕</button>
    </div>
  `).join('');
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function deleteTrack(id, idx, e) {
  e.stopPropagation();
  if (!confirm('Remove this track?')) return;
  try {
    await fetch('/api/tracks/' + id, { method: 'DELETE' });
    if (idx === currentIdx) {
      audioEl.pause(); audioEl.src = ''; setPlaying(false); currentIdx = -1;
      waveformData = []; drawWaveform([], 0);
      document.getElementById('heroTitle').textContent = '—';
      document.getElementById('heroTitle').className = 'hero-track-title';
      document.getElementById('heroArtist').textContent = '';
      document.getElementById('heroCoverImg').classList.remove('visible');
      document.getElementById('heroCoverPh').style.display = 'flex';
      document.getElementById('totalTime').textContent = '0:00';
      document.getElementById('currentTime').textContent = '0:00';
    } else if (idx < currentIdx) currentIdx--;
    tracks.splice(idx, 1);
    renderTracks();
  } catch { showToast('Failed to delete', true); }
}

// ── UPLOAD ────────────────────────────────────────────
function openUpload() {
  pendingAudioFile = null; pendingCoverFile = null;
  document.getElementById('inputTitle').value = '';
  document.getElementById('audioChosen').textContent = 'Tap to browse';
  document.getElementById('coverChosen').textContent = 'Tap to browse';
  document.getElementById('coverPreview').style.display = 'none';
  document.getElementById('audioInput').value = '';
  document.getElementById('coverInput').value = '';
  document.getElementById('uploadProgress').classList.remove('visible');
  document.getElementById('uploadSubmitBtn').disabled = false;
  document.getElementById('uploadModal').classList.add('open');
}
function closeUpload() { document.getElementById('uploadModal').classList.remove('open'); }

function handleAudioFile(input) {
  const f = input.files[0]; if (!f) return;
  pendingAudioFile = f;
  document.getElementById('audioChosen').innerHTML = `<span class="file-chosen">${f.name}</span>`;
}
function handleCoverFile(input) {
  const f = input.files[0]; if (!f) return;
  pendingCoverFile = f;
  document.getElementById('coverChosen').innerHTML = `<span class="file-chosen">${f.name}</span>`;
  const prev = document.getElementById('coverPreview');
  prev.src = URL.createObjectURL(f); prev.style.display = 'block';
}

async function submitUpload() {
  const title = document.getElementById('inputTitle').value.trim();
  if (!title) { document.getElementById('inputTitle').focus(); return; }
  if (!pendingAudioFile) { showToast('Select an audio file', true); return; }
  const fd = new FormData();
  fd.append('title', title);
  fd.append('audio', pendingAudioFile);
  if (pendingCoverFile) fd.append('cover', pendingCoverFile);
  const submitBtn = document.getElementById('uploadSubmitBtn');
  submitBtn.disabled = true;
  document.getElementById('uploadProgress').classList.add('visible');
  try {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/tracks');
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressText').textContent = `Uploading ${pct}%`;
      }
    };
    xhr.onload = () => {
      if (xhr.status === 201) {
        tracks.push(JSON.parse(xhr.responseText));
        closeUpload(); renderTracks(); showToast('Uploaded');
        loadTrack(tracks.length - 1, false);
      } else {
        showToast(JSON.parse(xhr.responseText).error || 'Upload failed', true);
        submitBtn.disabled = false;
      }
    };
    xhr.onerror = () => { showToast('Upload failed', true); submitBtn.disabled = false; };
    xhr.send(fd);
  } catch { showToast('Upload failed', true); submitBtn.disabled = false; }
}

// ── EDIT ARTIST ───────────────────────────────────────
function openEditArtist() {
  document.getElementById('inputArtistName').value = document.getElementById('artistName').textContent;
  document.getElementById('inputArtistTagline').value = document.getElementById('artistTagline').textContent;
  const igHref = document.getElementById('igLink').href;
  document.getElementById('inputIg').value = igHref.includes('instagram') ? igHref : '';
  document.getElementById('editArtistModal').classList.add('open');
}
function closeEditArtist() { document.getElementById('editArtistModal').classList.remove('open'); }
async function saveArtist() {
  const name = document.getElementById('inputArtistName').value.trim();
  const tagline = document.getElementById('inputArtistTagline').value.trim();
  const instagram = document.getElementById('inputIg').value.trim();
  try {
    const res = await fetch('/api/artist', {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, tagline, instagram })
    });
    applyArtist(await res.json());
    closeEditArtist(); showToast('Saved');
  } catch { showToast('Failed to save', true); }
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (error ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});
</script>
